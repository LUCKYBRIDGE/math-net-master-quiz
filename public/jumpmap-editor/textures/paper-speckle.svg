<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="speckleNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="1.15" numOctaves="2" seed="21"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
    <pattern id="speckle" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="6" r="1.1" fill="#b7ab98" opacity="0.4"/>
      <circle cx="13" cy="9" r="0.8" fill="#8e7f68" opacity="0.35"/>
      <circle cx="9" cy="16" r="0.9" fill="#cfc3ae" opacity="0.45"/>
      <circle cx="17" cy="3" r="0.7" fill="#9b8f7c" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="256" height="256" fill="#f0e9db"/>
  <rect width="256" height="256" fill="url(#speckle)"/>
  <rect width="256" height="256" filter="url(#speckleNoise)"/>
</svg>
