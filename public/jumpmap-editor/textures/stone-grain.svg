<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="stoneNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="3" seed="42"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.2"/></feComponentTransfer>
    </filter>
    <pattern id="vein" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M0 14 C10 10, 20 18, 32 12 C40 8, 46 15, 48 13" stroke="#7c838e" stroke-width="1" opacity="0.35" fill="none"/>
      <path d="M0 32 C12 28, 22 35, 34 31 C42 28, 47 33, 48 31" stroke="#c5c9d0" stroke-width="0.9" opacity="0.32" fill="none"/>
    </pattern>
  </defs>
  <rect width="256" height="256" fill="#aeb5bf"/>
  <rect width="256" height="256" fill="url(#vein)"/>
  <rect width="256" height="256" filter="url(#stoneNoise)"/>
</svg>
