<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <pattern id="fibers" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M2 6 C8 4, 14 8, 22 5" stroke="#cbb792" stroke-width="0.7" opacity="0.35" fill="none"/>
      <path d="M4 20 C11 16, 18 22, 26 19" stroke="#bca57f" stroke-width="0.6" opacity="0.25" fill="none"/>
      <circle cx="8" cy="12" r="0.8" fill="#dfcfb3" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="256" height="256" fill="#efe3cf"/>
  <rect width="256" height="256" fill="url(#fibers)"/>
  <rect width="256" height="256" filter="url(#paperNoise)"/>
</svg>
